site_name: DSPkit
site_description: DSP toolkit for structural health monitoring
site_author: Luigi
repo_url: https://github.com/your-username/DSPkit
repo_name: your-username/DSPkit
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            heading_level: 2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Conventions: conventions.md
  - API Reference:
      - Spectral: api/spectral.md
      - Filters: api/filters.md
      - Utilities: api/utils.md
      - Time-Frequency: api/timefreq.md
      - Instantaneous: api/instantaneous.md
      - EMD / HHT: api/emd.md
      - Plots: api/plots.md
  - Examples: examples.md
